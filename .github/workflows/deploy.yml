      env:
         main_project_module: app
         APP_PLATFORM: android-arm
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/wrapper
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            java-version: |
               17
            distribution: temurin
            mvn-toolchain-id: |
               JavaSE-17

      -  name: Decode Keystore
         uses: timheuer/base64-to-file@784a1a4a994315802b7d8e2084e116e783d157be
         with:
            fileName: android.jks
            fileDir: java/lionheart-android/app/
            encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      -  name: Get version
         run: echo "APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      -  name: Build JAR
         run: mvn clean install -U -Pgame

      -  name: Build APK
         run: |
            cd java/lionheart-android
            chmod +x ./gradlew
            ./gradlew assembleRelease -Pkeystore=android.jks -Pkeystore.alias=${{ secrets.KEYSTORE_ALIAS }} -Pkeystore.storepassword=${{ secrets.KEYSTORE_STOREPASS }} -Pkeystore.password=${{ secrets.KEYSTORE_PASS }}

      -  name: Sign app APK
         uses: r0adkll/sign-android-release@dbeba6b98a60b0fd540c02443c7f428cdedf0e7f
         env:
            BUILD_TOOLS_VERSION: 36.0.0
         with:
            releaseDirectory: java/lionheart-android/app/build/outputs/apk/release/
            signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
            alias: ${{ secrets.KEYSTORE_ALIAS }}
            keyStorePassword: ${{ secrets.KEYSTORE_STOREPASS }}
            keyPassword: ${{ secrets.KEYSTORE_PASS }}

      -  name: Make Archive
         run: |
            export TARGET=${{ env.APP_NAME }}-${{ env.APP_VERSION }}_${{ env.APP_PLATFORM }}
            mkdir build
            mkdir build/$TARGET
            cd build/$TARGET
            cp -R ../../distribution/doc "doc"
            cp "../../CHANGELOG" "doc/CHANGELOG.txt"
            cp "../../LICENSE" "doc/LICENSE.txt"
            cp "../../java/lionheart-android/app/build/outputs/apk/release/app-release-signed.apk" ${{ env.APP_NAME }}-${{ env.APP_VERSION }}.apk
            cd ..
            zip -9 -r $TARGET.zip $TARGET
            rm -r -f $TARGET
            sha256sum $TARGET.zip
            sha256sum $TARGET.zip > $TARGET".zip.sha256sum"

      -  name: Deploy archives
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: build/
            server-dir: /${{ env.APP_VERSION }}/