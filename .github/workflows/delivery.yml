name: Delivery

on:
   workflow_dispatch:
      inputs:
         target:
            required: true
            type: choice
            options:
            - win32-x86
            - win32-x86-64
            - linux-x86-64
            - linux-x86-32
            - macos-x86_64
            - macos-aarch64
            - android-arm

jobs:
   setup:
      name: Setup [${{ inputs.target }}]
      runs-on: ubuntu-latest
      outputs:
         os: ${{ steps.cfg.outputs.os }}
         arch: ${{ steps.cfg.outputs.arch }}
         java_version: ${{ steps.cfg.outputs.java_version }}
         java_dist: ${{ steps.cfg.outputs.java_dist }}

      steps:
      -  name: Config
         id: cfg
         shell: pwsh
         run: |
            $map = [ordered]@{
              'win32-x86'     = @{ os = 'windows-latest'; arch = 'x86';     java_version = '17'; java_dist = 'temurin' }
              'win32-x86-64'  = @{ os = 'windows-latest'; arch = 'x64';     java_version = '25'; java_dist = 'temurin' }
              'linux-x86-64'  = @{ os = 'ubuntu-latest';  arch = 'x64';     java_version = '25'; java_dist = 'temurin' }
              'linux-x86-32'  = @{ os = 'ubuntu-latest';  arch = 'x86';     java_version = '17'; java_dist = 'zulu' }
              'macos-x86_64'  = @{ os = 'macos-13';       arch = 'x64';     java_version = '25'; java_dist = 'temurin' }
              'macos-aarch64' = @{ os = 'macos-latest';   arch = 'aarch64'; java_version = '25'; java_dist = 'temurin' }
              'android-arm'   = @{ os = 'ubuntu-latest';  arch = 'arm';     java_version = '17'; java_dist = 'temurin' }
            }

            $target = '${{ inputs.target }}'
            $cfg    = $map[$target]

            if (-not $cfg) { throw "Unknown platform: $target" }

            foreach ($key in $cfg.Keys) {
              "$key=$($cfg[$key])" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
            }

   delivery:
      name: Build [${{ inputs.target }}]
      needs: setup
      runs-on: ${{ needs.setup.outputs.os }}
      env:
         ARCH: ${{ needs.setup.outputs.arch }}
         JAVA_VERSION: ${{ needs.setup.outputs.java_version }}
         JAVA_DIST: ${{ needs.setup.outputs.java_dist }}

      steps:
         -  name: Checkout
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         -  name: Cache Maven
            uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7

            with:
               path: ~/.m2/repository
               key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

         -  name: Cache Gradle
            uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
            with:
               path: |
                  ~/.gradle/caches
                  ~/.gradle/wrapper
               key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

         -  name: Setup Java
            uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
            with:
               distribution: ${{ env.JAVA_DIST }}
               java-version: ${{ env.JAVA_VERSION }}
               architecture: ${{ env.ARCH }}

         -  name: Set up Maven
            uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0
            with:
               maven-version: 3.9.14

         -  name: Install WiX 3.14
            if: runner.os == 'Windows' && env.ARCH == 'x86'
            shell: pwsh
            run: |
              Invoke-WebRequest https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip -OutFile wix.zip
              Expand-Archive wix.zip -DestinationPath wix
              echo "WIX=$(pwd)/wix" >> $env:GITHUB_ENV
              $env:PATH="$env:WIX;$env:PATH"

         -  name: Build
            shell: pwsh
            env:
               GPG_B64: ${{ secrets.GPG_B64 }}
               GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
               KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
               KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
               KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
            run: |
               $params = @{
                 Platform      = "${{ inputs.target }}"
                 Architecture  = $env:ARCH
                 GpgB64        = $env:GPG_B64
                 GpgPassphrase = $env:GPG_PASSPHRASE
                 KeystoreB64   = $env:KEYSTORE_B64
                 KeystoreAlias = $env:KEYSTORE_ALIAS
                 KeystorePass  = $env:KEYSTORE_PASS
               }
               $script = Join-Path $PWD "scripts/delivery.ps1"
               & $script @params

         -  name: FTP Deploy
            uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
            with:
               server: ${{ secrets.FTP_SERVER }}
               username: ${{ secrets.FTP_USER }}
               password: ${{ secrets.FTP_PASS }}
               local-dir: build/